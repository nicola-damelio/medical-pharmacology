<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedBioChem PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
body{font-family:'Inter',sans-serif;background:#f0f4ff;min-height:100vh;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:slideUp .35s cubic-bezier(.16,1,.3,1) both}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(99,102,241,.45)}70%{box-shadow:0 0 0 12px rgba(99,102,241,0)}100%{box-shadow:0 0 0 0 rgba(99,102,241,0)}}
.pulse{animation:pulse-ring 1.8s infinite}
.cat-cb:not(:checked)+label{opacity:.42;filter:grayscale(.55);border-style:dashed;transform:scale(.97)}
.cat-cb:checked+label{opacity:1;filter:none;border-style:solid;transform:scale(1);box-shadow:0 3px 8px -2px rgba(0,0,0,.08)}
.cat-cb+label{transition:all .22s ease}
.scrollbar-hide::-webkit-scrollbar{display:none}
.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
.rich strong{font-weight:700}
.rich em{font-style:italic}
.rich p{margin-bottom:.5rem}
.rich p:last-child{margin-bottom:0}
.rich ul{list-style:disc;padding-left:1.2rem;margin-bottom:.4rem}
.rich li{margin-bottom:.2rem}
/* Schema SVG wrapper */
.schema-wrap{width:100%;overflow-x:auto;border-radius:.75rem;background:#fff;border:1px solid #e2e8f0;padding:.5rem}
.schema-wrap svg{display:block;margin:auto;max-width:100%;height:auto}
/* Tab buttons */
.tab-btn{padding:.5rem 1rem;font-size:.75rem;font-weight:700;border-radius:.5rem;transition:all .15s}
.tab-btn.active{background:#4f46e5;color:#fff;box-shadow:0 2px 6px rgba(79,70,229,.3)}
.tab-btn:not(.active){background:#f1f5f9;color:#475569}
</style>
</head>
<body class="text-slate-800 pb-16 overflow-x-hidden selection:bg-indigo-200 selection:text-indigo-900">
<div id="app" class="w-full min-h-screen flex flex-col max-w-4xl mx-auto"></div>
<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const GEMINI_MODEL='gemini-2.5-flash';
const GURL=k=>`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${k}`;

// Esempi di farmaci per categoria — usati nel prompt per ancorare il modello
const CAT={
  snc:{bg:'bg-purple-100',text:'text-purple-900',border:'border-purple-300',icon:'brain',
    title:'Sistema Nervoso Centrale',desc:'Ansiolitici, Antidepressivi, Antipsicotici, Antiepilettici',
    examples:'sertralina, aloperidolo, levodopa, diazepam, carbamazepina, donepezil, memantina, clozapina'},
  cardio:{bg:'bg-rose-100',text:'text-rose-900',border:'border-rose-300',icon:'heart-pulse',
    title:'Cardiovascolare',desc:'Antipertensivi, Antiaritmici, Anticoagulanti, Statine, Diuretici',
    examples:'atorvastatina, metoprololo, amiodarone, warfarin, ramipril, furosemide, amlodipina, digossina'},
  resp:{bg:'bg-sky-100',text:'text-sky-900',border:'border-sky-300',icon:'wind',
    title:'Respiratorio',desc:'Broncodilatatori, Corticosteroidi inalatori, Antiasmatici',
    examples:'salbutamolo, salmeterolo, budesonide, tiotropio, montelukast, omalizumab, roflumilast, N-acetilcisteina'},
  gastro:{bg:'bg-amber-100',text:'text-amber-900',border:'border-amber-300',icon:'coffee',
    title:'Gastrointestinale',desc:'IPP, Antiemetici, Procinetici, Lassativi, IBD',
    examples:'omeprazolo, metoclopramide, ondansetron, mesalazina, infliximab, loperamide, colestiramina, bismuto'},
  inf:{bg:'bg-teal-100',text:'text-teal-900',border:'border-teal-300',icon:'bug',
    title:'Malattie Infettive',desc:'Antibiotici, Antivirali, Antimicotici, Antiparassitari',
    examples:'amoxicillina, ciprofloxacina, vancomicina, metronidazolo, fluconazolo, aciclovir, tenofovir, artemisina'},
  endo:{bg:'bg-pink-100',text:'text-pink-900',border:'border-pink-300',icon:'activity',
    title:'Endocrino / Metabolico',desc:'Insuline, Ipoglicemizzanti orali, Ormoni tiroidei',
    examples:'insulina glargine, metformina, sitagliptin, levotiroxina, alendronato, prednisone, testosterone, GnRH analoghi'},
  immuno:{bg:'bg-indigo-100',text:'text-indigo-900',border:'border-indigo-300',icon:'shield',
    title:'Immunitario',desc:'FANS, Corticosteroidi, DMARD, Biologici',
    examples:'ibuprofene, metotressato, idrossiclorochina, adalimumab, rituximab, ciclosporina, tacrolimus, belimumab'},
  onco:{bg:'bg-orange-100',text:'text-orange-900',border:'border-orange-300',icon:'dna',
    title:'Oncologia',desc:'Chemioterapici, Target therapy, Checkpoint inhibitor',
    examples:'cisplatino, paclitaxel, imatinib, trastuzumab, pembrolizumab, CHOP, tamoxifene, erlotinib'}
};

// ═══════════════════════════════════════════════════════════
// STATO
// ═══════════════════════════════════════════════════════════
const S={
  view:'home',apiKey:'',
  numQ:10,cases:[],idx:0,chosen:null,score:0,
  chatOpen:false,chatHist:[],chatBusy:false,loadMsg:'',
  tab:'feedback',           // 'feedback' | 'patho' | 'review'
  pathoLoading:false,       // true mentre carica la scheda patologia
  reviewOpen:false          // modal revisione finale
};

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function md(t){
  if(!t)return'';
  return t
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h4 class="font-bold text-slate-700 mt-3 mb-1 text-sm">$1</h4>')
    .replace(/^## (.+)$/gm,'<h3 class="font-bold text-slate-800 mt-3 mb-1 text-base">$1</h3>')
    .split(/\n{2,}/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
}

function molImg(kw){
  const s=encodeURIComponent((kw||'').trim());
  const u=`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${s}/PNG?record_type=2d&image_size=large`;
  return`<div class="relative w-full h-20 mt-2 bg-white rounded-lg overflow-hidden border border-slate-100 flex items-center justify-center">
    <img src="${u}" alt="${kw}" loading="lazy"
      class="w-full h-full object-contain p-1.5 absolute inset-0 z-10 opacity-0 transition-opacity duration-300"
      onload="this.classList.remove('opacity-0');this.nextElementSibling.style.display='none';"
      onerror="this.style.display='none';">
    <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-300 p-1 text-center">
      <i data-lucide="hexagon" class="w-5 h-5 mb-1 opacity-40"></i>
      <span class="text-[9px] font-bold leading-tight">${kw}</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// API GEMINI
// ═══════════════════════════════════════════════════════════
async function geminiRaw(body){
  const res=await fetch(GURL(S.apiKey),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.text();throw new Error(`Gemini ${res.status}: ${e}`);}
  const d=await res.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
}

async function geminiText(prompt,system=''){
  return geminiRaw({
    contents:[{parts:[{text:prompt}]}],
    ...(system?{systemInstruction:{parts:[{text:system}]}}:{})
  });
}

async function geminiJSON(prompt){
  return geminiRaw({
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{
      responseMimeType:'application/json',
      responseSchema:{
        type:'OBJECT',
        properties:{
          cases:{
            type:'ARRAY',
            items:{
              type:'OBJECT',
              properties:{
                category:{type:'STRING'},
                disease_name:{type:'STRING'},
                scenario:{type:'STRING'},
                options:{type:'ARRAY',items:{type:'STRING'}},
                correctAnswer:{type:'STRING'},
                pubchem_keyword:{type:'STRING'},
                tag:{type:'STRING'},
                mech:{type:'STRING'},
                expl:{type:'STRING'}
              },
              required:['category','disease_name','scenario','options','correctAnswer','pubchem_keyword','tag','mech','expl']
            }
          }
        },
        required:['cases']
      }
    }
  }).then(raw=>JSON.parse(raw.replace(/```json|```/g,'').trim()));
}

// ═══════════════════════════════════════════════════════════
// CARICA SCHEDA PATOLOGIA (lazy, al primo click sul tab)
// ═══════════════════════════════════════════════════════════
async function loadPatho(idx){
  const c=S.cases[idx];
  if(c.patho)return; // già caricata
  S.pathoLoading=true; render();

  const prompt=`Sei un esperto di medicina e biochimica molecolare. Scrivi una scheda didattica sulla patologia/condizione: "${c.disease_name}" (il caso riguardava l'uso di: ${c.correctAnswer}).

La scheda deve avere QUESTE SEZIONI OBBLIGATORIE in questo ordine, marcate con ###:

### Classificazione e Fisiopatologia
2-3 frasi dense: tipo, origine molecolare/cellulare della patologia, pathway chiave coinvolti.

### Biologia Molecolare Chiave
Elenco puntato (usa - ) con 4-6 punti su: mutazioni driver o alterazioni molecolari più frequenti, recettori/enzimi/canali patologici, biomarcatori diagnostici/prognostici rilevanti. Sii MOLTO specifico (es. "mutazione KRAS G12C nel 13% degli NSCLC", "iperattivazione mTOR via PI3K/AKT"). Dove un termine è molto tecnico, aggiungi tra parentesi una spiegazione semplice.

### Meccanismo di Danno Tissutale
2-3 frasi: come la patologia causa danno a livello cellulare/tissutale (apoptosi, infiammazione, ischemia, demielinizzazione, ecc.).

### Farmacologia Rilevante nel Contesto
1-2 frasi: perché il farmaco scelto (${c.correctAnswer}) interrompe la cascata patologica.

La risposta deve essere in italiano. NON usare ** per i titoli (uso già ### per quelli). Usa ** solo per termini tecnici chiave all'interno del testo. Il tono è da docente universitario che parla a un esperto, ma spiega i tecnicismi tra parentesi per chi legge velocemente.`;

  // Genera anche SVG schema
  const svgPrompt=`Crea un diagramma SVG didattico e visivamente chiaro che illustra la fisiopatologia di "${c.disease_name}". 

Requisiti SVG:
- viewBox="0 0 560 320"
- Sfondo bianco (rect fill="#fff")
- Usa rettangoli arrotondati (rx="8") con colori pastello distinti per ogni elemento
- Frecce chiare con marker arrowhead (definisci <defs><marker id="arr" ...>)
- Font sans-serif, testo leggibile ≥11px
- Mostra: almeno 3-5 step del pathway patologico con etichette brevi in italiano
- Includi il nome della patologia come titolo in alto (font-size="16" font-weight="bold")
- Colori: usa palette coerente (blu #dbeafe, verde #dcfce7, rosso #fee2e2, giallo #fef9c3, viola #ede9fe)
- NON includere nulla fuori dal tag SVG. Rispondi con SOLO il codice SVG, niente testo prima o dopo.`;

  try{
    const [textRaw, svgRaw]=await Promise.all([
      geminiText(prompt),
      geminiText(svgPrompt)
    ]);
    // Estrai solo il blocco SVG
    const svgMatch=svgRaw.match(/<svg[\s\S]*<\/svg>/i);
    c.patho={ text:textRaw, svg: svgMatch?svgMatch[0]:null };
  }catch(e){
    c.patho={ text:'Errore nel caricamento della scheda: '+e.message, svg:null };
  }
  S.pathoLoading=false; render();
}

// ═══════════════════════════════════════════════════════════
// GENERA QUIZ
// ═══════════════════════════════════════════════════════════
async function generateQuiz(){
  if(!S.apiKey.trim()){alert('Inserisci prima la tua API Key Gemini.');return;}
  const selKeys=Array.from(document.querySelectorAll('.cat-cb:checked')).map(cb=>cb.value);
  if(!selKeys.length){alert('Seleziona almeno un sistema corporeo.');return;}

  S.numQ=parseInt(document.getElementById('num-select').value);
  S.view='loading';
  S.loadMsg=`Creazione di ${S.numQ} casi clinici…`;
  render();

  // Distribuzione matematicamente esatta
  const base=Math.floor(S.numQ/selKeys.length);
  const remainder=S.numQ%selKeys.length;
  let counts={};
  selKeys.forEach((k,i)=>counts[k]=base+(i<remainder?1:0));

  const distribLines=selKeys.map(k=>{
    const ex=CAT[k].examples;
    return `- Categoria "${CAT[k].title}" → chiave JSON: "${k}" → ESATTAMENTE ${counts[k]} casi\n  Esempi di farmaci OBBLIGATORI per questa categoria: ${ex}`;
  }).join('\n');

  const allKeys=selKeys.map(k=>`"${k}"`).join(', ');

  const prompt=`Sei un docente di Farmacologia Clinica universitario italiano. Genera ESATTAMENTE ${S.numQ} casi clinici.

━━━ DISTRIBUZIONE OBBLIGATORIA ━━━
${distribLines}

━━━ REGOLE ASSOLUTE ━━━
1. Il campo "category" deve essere IDENTICO a una di queste chiavi ESATTE: ${allKeys}
   ⚠️ VIETATO usare qualsiasi altra chiave — verifica ogni caso prima di includerlo.
2. Ogni farmaco (correctAnswer e options) deve appartenere STRETTAMENTE alla categoria indicata.
   Esempio: se category="snc", il farmaco corretto deve essere un farmaco SNC (antidepressivo, antipsicotico, anticonvulsivante, ecc.) — MAI un antibiotico, MAI un antiipertensivo.
3. "disease_name": nome breve della patologia principale del caso (es. "NSCLC EGFR+", "Sepsi da E. coli", "Infarto miocardico STEMI", "Depressione maggiore resistente").
4. Scenario DETTAGLIATO (6-8 righe): paziente con età/sesso/peso, comorbidità rilevanti, parametri vitali anormali, esami di laboratorio chiave con valori, storia farmacologica, presentazione clinica acuta, quesito terapeutico specifico.
5. Le 4 options devono essere plausibili ma distinguibili: decoy dello stesso sistema corporeo.
6. "mech" (80-120 parole): recettore/enzima/canale bersaglio, via di trasduzione, effetto farmacologico diretto e correlazione clinica.
7. "expl" (100-150 parole): prima scelta guidata da linee guida (cita brevemente: ACC/AHA, ESC, WHO, NCCN, ecc.), effetti avversi principali, interazioni farmacologiche rilevanti, pearl clinico pratico.
8. "pubchem_keyword": nome INN del farmaco corretto (una parola o nome breve).
9. "tag": sottocategoria specifica (es. "β1-bloccante cardioselettivo", "SSRI", "cefalosporina III gen.", "anti-PD1").`;

  try{
    S.loadMsg='L\'IA sta costruendo i casi clinici…';render();
    const parsed=await geminiJSON(prompt);
    if(!parsed.cases?.length)throw new Error('Nessun caso generato');

    const valid=parsed.cases.filter(c=>selKeys.includes(c.category));
    if(!valid.length)throw new Error('Il modello ha generato solo categorie non selezionate. Riprova.');

    valid.forEach(c=>{
      c.options=c.options.sort(()=>Math.random()-.5);
      c.patho=null; // lazy load
    });

    S.cases=valid;S.idx=0;S.score=0;S.chosen=null;
    S.chatHist=[];S.chatOpen=false;S.tab='feedback';S.reviewOpen=false;
    S.view='quiz';
  }catch(e){
    console.error(e);
    alert('Errore generazione:\n'+e.message+'\n\nVerifica che la chiave API sia valida e riprova.');
    S.view='home';
  }
  render();window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════════════════════
async function sendChat(){
  const inp=document.getElementById('chat-input');
  const txt=inp.value.trim();
  if(!txt||S.chatBusy)return;
  const c=S.cases[S.idx];
  S.chatHist.push({role:'user',text:txt});
  inp.value='';S.chatBusy=true;render();scrollChat();
  const hist=S.chatHist.slice(0,-1).map(m=>`${m.role==='user'?'Studente':'Tutor'}: ${m.text}`).join('\n');
  const system=`Sei un tutor esperto di Farmacologia Clinica e Biochimica Molecolare. Rispondi in italiano.
Contesto: Scenario="${c.scenario}" | Farmaco corretto: ${c.correctAnswer} (${c.tag}) | Meccanismo: ${c.mech}
${hist?'Conversazione precedente:\n'+hist:''}
Regole: sii DIDATTICO e APPROFONDITO. Spiega pathway molecolari, cita trials/linee guida, confronta le alternative. Per termini tecnici molto specifici, aggiungi tra parentesi una spiegazione semplice. Paragrafi brevi per leggibilità mobile.`;
  try{
    const reply=await geminiText(txt,system);
    S.chatHist.push({role:'ai',text:reply});
  }catch(e){
    S.chatHist.push({role:'ai',text:'⚠️ Errore: '+e.message});
  }
  S.chatBusy=false;render();scrollChat();
}

// ═══════════════════════════════════════════════════════════
// HANDLERS
// ═══════════════════════════════════════════════════════════
function pickAnswer(opt){
  if(S.chosen)return;
  S.chosen=opt;
  if(opt===S.cases[S.idx].correctAnswer)S.score++;
  S.tab='feedback';
  render();
  setTimeout(()=>document.getElementById('feedback')?.scrollIntoView({behavior:'smooth',block:'nearest'}),120);
}
function switchTab(t){
  S.tab=t;
  if(t==='patho')loadPatho(S.idx);
  render();
  setTimeout(()=>document.getElementById('feedback')?.scrollIntoView({behavior:'smooth',block:'start'}),80);
}
function goNext(){
  if(S.idx<S.cases.length-1){
    S.idx++;S.chosen=null;S.chatOpen=false;S.chatHist=[];S.tab='feedback';
    render();window.scrollTo({top:0,behavior:'smooth'});
  }else{
    S.view='results';S.chatOpen=false;
    render();window.scrollTo({top:0,behavior:'smooth'});
  }
}
function goHome(){S.view='home';render();window.scrollTo(0,0);}
function toggleChat(){S.chatOpen=!S.chatOpen;render();if(S.chatOpen)scrollChat();}
function scrollChat(){setTimeout(()=>{const el=document.getElementById('cs');if(el)el.scrollTop=el.scrollHeight;},80);}
function chatEnter(e){if(e.key==='Enter')sendChat();}
function toggleAll(){const cbs=document.querySelectorAll('.cat-cb');const all=Array.from(cbs).every(cb=>cb.checked);cbs.forEach(cb=>cb.checked=!all);}
function saveKey(){const k=document.getElementById('aki')?.value.trim();if(k){S.apiKey=k;localStorage.setItem('mbp_key',k);render();}}
function openReview(){S.reviewOpen=true;render();}
function closeReview(){S.reviewOpen=false;render();}
function jumpTo(i){S.reviewOpen=false;S.idx=i;S.chosen=S.cases[i].chosen_answer;S.tab='feedback';render();window.scrollTo(0,0);}

// ═══════════════════════════════════════════════════════════
// RENDER HOME
// ═══════════════════════════════════════════════════════════
function renderHome(){
  const saved=S.apiKey||localStorage.getItem('mbp_key')||'';
  if(!S.apiKey&&saved)S.apiKey=saved;
  const catsHTML=Object.entries(CAT).map(([k,t])=>`
  <div class="relative">
    <input type="checkbox" id="cat_${k}" value="${k}" class="cat-cb peer sr-only" checked>
    <label for="cat_${k}" class="flex items-center gap-3 p-3 border-2 ${t.border} ${t.bg} rounded-xl cursor-pointer">
      <div class="w-9 h-9 rounded-lg bg-white/60 flex items-center justify-center shrink-0">
        <i data-lucide="${t.icon}" class="w-4 h-4 ${t.text}"></i>
      </div>
      <div>
        <div class="font-bold text-[13px] ${t.text} leading-tight">${t.title}</div>
        <div class="text-[11px] text-slate-500 leading-snug mt-0.5">${t.desc}</div>
      </div>
    </label>
  </div>`).join('');
  return`
  <div class="p-4 sm:p-6 anim w-full flex-1">
    <div class="text-center mb-8 mt-4">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl shadow-lg mb-3 rotate-3">
        <i data-lucide="dna" class="w-7 h-7 text-white"></i>
      </div>
      <h1 class="text-2xl sm:text-3xl font-black text-slate-800 tracking-tight mb-1">MedBioChem <span class="text-indigo-600">PRO</span></h1>
      <p class="text-xs text-slate-500 font-medium">Simulazione Clinica Farmacologica · Powered by Gemini AI</p>
    </div>
    <div class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
      <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
        <h2 class="font-bold text-sm text-yellow-900 flex items-center gap-2 mb-1">
          <i data-lucide="key" class="w-4 h-4 text-yellow-600"></i> Gemini API Key
        </h2>
        <p class="text-[11px] text-yellow-700 mb-2">Gratuita su <a href="https://aistudio.google.com/app/apikey" target="_blank" class="underline font-semibold">aistudio.google.com</a> · salvata solo nel tuo browser.</p>
        <div class="flex gap-2">
          <input type="password" id="aki" value="${S.apiKey}" placeholder="AIza…"
            class="flex-1 bg-white border border-yellow-300 focus:border-yellow-500 rounded-lg px-3 py-2 text-[13px] outline-none font-mono text-slate-700"/>
          <button onclick="saveKey()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold text-xs px-4 py-2 rounded-lg transition-colors">Salva</button>
        </div>
        ${S.apiKey?'<p class="text-[11px] text-green-700 font-semibold mt-1.5">✓ Chiave caricata</p>':''}
      </div>
      <div>
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-sm text-slate-700 flex items-center gap-2">
            <i data-lucide="layers" class="w-4 h-4 text-indigo-500"></i> Sistemi Corporei
          </h2>
          <button type="button" onclick="toggleAll()" class="text-[11px] font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-md hover:bg-indigo-100 transition-colors">Alterna Selezione</button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${catsHTML}</div>
      </div>
      <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-center justify-between gap-4">
        <h2 class="font-bold text-sm text-slate-700 flex items-center gap-2 shrink-0">
          <i data-lucide="hash" class="w-4 h-4 text-indigo-500"></i> N. Casi
        </h2>
        <select id="num-select" class="w-full max-w-[200px] bg-white border border-slate-200 p-2 text-sm rounded-lg font-semibold text-slate-800 outline-none focus:border-indigo-400">
          <option value="5">Breve (5)</option>
          <option value="10" selected>Standard (10)</option>
          <option value="20">Esteso (20)</option>
        </select>
      </div>
      <button onclick="generateQuiz()" class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold text-sm py-3.5 rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
        <i data-lucide="play-circle" class="w-4 h-4"></i> Genera Simulazione
      </button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER LOADING
// ═══════════════════════════════════════════════════════════
function renderLoading(){
  return`
  <div class="flex-1 flex flex-col items-center justify-center p-6 text-center min-h-[60vh] anim">
    <div class="w-16 h-16 bg-indigo-500 rounded-full pulse mb-6 flex items-center justify-center">
      <i data-lucide="flask-conical" class="w-7 h-7 text-white animate-pulse"></i>
    </div>
    <h2 class="text-lg font-bold text-slate-800 mb-2">Elaborazione in corso…</h2>
    <p class="text-xs text-indigo-600 font-semibold bg-indigo-50 px-4 py-2 rounded-lg border border-indigo-100">${S.loadMsg}</p>
    <p class="text-[11px] text-slate-400 mt-3">L'IA sta costruendo i casi clinici. Attendi 15-30 secondi.</p>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER QUIZ
// ═══════════════════════════════════════════════════════════
function renderQuiz(){
  const c=S.cases[S.idx];
  const th=CAT[c.category]||{bg:'bg-slate-100',text:'text-slate-800',border:'border-slate-200',icon:'file-text',title:'Generico'};
  const answered=!!S.chosen;
  const correct=S.chosen===c.correctAnswer;

  const optsHTML=c.options.map(o=>{
    let cls='bg-white border border-slate-200 text-slate-700 hover:border-indigo-300 shadow-sm cursor-pointer';
    if(answered){
      cls='bg-slate-50 border border-slate-200 text-slate-400 opacity-50 cursor-not-allowed';
      if(o===c.correctAnswer)cls='bg-green-50 border-2 border-green-500 text-green-800 shadow-md opacity-100 font-bold';
      else if(o===S.chosen) cls='bg-red-50 border-2 border-red-500 text-red-800 opacity-100 font-bold';
    }
    const esc=o.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return`<button onclick="pickAnswer('${esc}')" ${answered?'disabled':''}
      class="flex flex-col items-center p-3 sm:p-4 rounded-xl transition-all duration-150 text-center ${cls} h-full min-h-[130px]">
      <span class="text-sm font-semibold leading-tight flex-1 flex items-center justify-center w-full">${o}</span>
      ${molImg(o===c.correctAnswer?c.pubchem_keyword:o)}
    </button>`;
  }).join('');

  // ── POST-RISPOSTA: tab sistema ───────────────────────────
  let postHTML='';
  if(answered){
    const tabBar=`
    <div class="flex gap-2 mb-4">
      <button onclick="switchTab('feedback')" class="tab-btn ${S.tab==='feedback'?'active':''}">
        <i data-lucide="check-circle" class="w-3 h-3 inline-block mr-1 -mt-0.5"></i>Farmacologia
      </button>
      <button onclick="switchTab('patho')" class="tab-btn ${S.tab==='patho'?'active':''}">
        <i data-lucide="microscope" class="w-3 h-3 inline-block mr-1 -mt-0.5"></i>Patologia
      </button>
    </div>`;

    let tabContent='';
    if(S.tab==='feedback'){
      tabContent=`
      <div class="space-y-4">
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
          <h4 class="font-bold text-slate-700 text-[11px] uppercase tracking-wider mb-2 flex items-center gap-1.5">
            <i data-lucide="microscope" class="w-3.5 h-3.5 text-indigo-500"></i> Meccanismo d'Azione
          </h4>
          <div class="text-[13px] text-slate-600 leading-relaxed rich">${md(c.mech)}</div>
        </div>
        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
          <h4 class="font-bold text-indigo-800 text-[11px] uppercase tracking-wider mb-2 flex items-center gap-1.5">
            <i data-lucide="stethoscope" class="w-3.5 h-3.5 text-indigo-500"></i> Razionale Clinico & Pearl
          </h4>
          <div class="text-[13px] text-indigo-900/80 leading-relaxed rich">${md(c.expl)}</div>
        </div>
      </div>`;
    } else if(S.tab==='patho'){
      if(S.pathoLoading){
        tabContent=`<div class="flex flex-col items-center justify-center py-10 gap-3">
          <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-indigo-500"></i>
          <p class="text-sm text-slate-500">Caricamento scheda patologica…</p>
        </div>`;
      } else if(c.patho){
        const svgSection=c.patho.svg?`
        <div class="mb-4">
          <h4 class="font-bold text-slate-700 text-[11px] uppercase tracking-wider mb-2 flex items-center gap-1.5">
            <i data-lucide="git-branch" class="w-3.5 h-3.5 text-indigo-500"></i> Schema Fisiopatologico
          </h4>
          <div class="schema-wrap">${c.patho.svg}</div>
        </div>`:'';
        tabContent=`
        <div class="space-y-4">
          ${svgSection}
          <div class="bg-violet-50 p-4 rounded-xl border border-violet-100">
            <h4 class="font-bold text-violet-800 text-[11px] uppercase tracking-wider mb-2 flex items-center gap-1.5">
              <i data-lucide="book-open" class="w-3.5 h-3.5 text-violet-500"></i> Scheda Patologica — ${c.disease_name}
            </h4>
            <div class="text-[13px] text-violet-900/80 leading-relaxed rich">${md(c.patho.text)}</div>
          </div>
        </div>`;
      }
    }

    const navBtns=`
    <div class="flex flex-col sm:flex-row gap-3 pt-3 border-t border-slate-100 mt-4">
      <button onclick="toggleChat()" class="w-full sm:w-1/3 bg-white border border-indigo-200 text-indigo-600 py-2.5 rounded-lg font-semibold text-xs hover:bg-indigo-50 transition-colors flex items-center justify-center gap-2">
        <i data-lucide="message-circle-question" class="w-4 h-4"></i> Chiedi all'IA
      </button>
      <button onclick="goNext()" class="w-full sm:flex-1 bg-slate-800 text-white py-2.5 rounded-lg font-semibold text-xs hover:bg-slate-700 transition-colors flex items-center justify-center gap-2 shadow-sm">
        ${S.idx<S.cases.length-1?'Caso Successivo':'Fine Simulazione'}
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </div>`;

    postHTML=`
    <div id="feedback" class="mt-8 bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden anim">
      <div class="p-4 ${correct?'bg-green-100 text-green-900':'bg-red-100 text-red-900'} flex items-center gap-3">
        <i data-lucide="${correct?'check-circle':'x-circle'}" class="w-6 h-6 shrink-0"></i>
        <div>
          <div class="font-bold text-sm">${correct?'✓ Risposta corretta!':'✗ Risposta errata'}</div>
          ${!correct?`<div class="text-xs mt-0.5">Il farmaco corretto è <strong>${c.correctAnswer}</strong></div>`:''}
        </div>
      </div>
      <div class="p-5 sm:p-6">
        ${tabBar}
        ${tabContent}
        ${navBtns}
      </div>
    </div>`;
  }

  return`
  <div class="${th.bg} ${th.text} px-4 sm:px-6 py-3 flex justify-between items-center sticky top-0 z-20 border-b ${th.border}">
    <div class="flex items-center gap-3">
      <i data-lucide="${th.icon}" class="w-5 h-5 opacity-70"></i>
      <div>
        <div class="text-[10px] uppercase font-bold opacity-60">${th.title}</div>
        <div class="font-bold text-sm leading-none mt-0.5">Paziente ${S.idx+1}</div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="text-[11px] font-bold bg-white/40 border border-white/20 px-2.5 py-1 rounded-md">${S.idx+1}/${S.cases.length}</div>
      <div class="text-[11px] font-bold text-green-700 bg-green-100 border border-green-200 px-2.5 py-1 rounded-md">✓ ${S.score}</div>
    </div>
  </div>
  <div class="p-4 sm:p-6 w-full anim flex-1">
    <div class="bg-white rounded-xl p-5 sm:p-6 shadow-sm border border-slate-200 mb-6">
      <span class="inline-block bg-slate-100 text-slate-500 font-bold px-2.5 py-1 rounded text-[10px] mb-3 border border-slate-200 uppercase tracking-wide">${c.tag}</span>
      <p class="text-sm sm:text-[15px] font-medium text-slate-800 leading-relaxed">${c.scenario}</p>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4">${optsHTML}</div>
    ${postHTML}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER RESULTS
// ═══════════════════════════════════════════════════════════
function renderResults(){
  const pct=Math.round((S.score/S.cases.length)*100);
  const col=pct>=60?'text-emerald-600':pct>=40?'text-amber-500':'text-red-500';
  const msg=pct>=80?'🏆 Eccellente!':pct>=60?'👍 Buon lavoro!':pct>=40?'📚 Studia ancora un po\'!':'🔄 Riprova — serve più pratica.';

  // Mini-lista per categoria
  const byCat={};
  S.cases.forEach(c=>{
    if(!byCat[c.category])byCat[c.category]={correct:0,total:0,title:CAT[c.category]?.title||c.category};
    byCat[c.category].total++;
    if(c.chosen_answer===c.correctAnswer)byCat[c.category].correct++;
  });
  const catRows=Object.values(byCat).map(b=>{
    const p=Math.round((b.correct/b.total)*100);
    const bar=`<div class="h-1.5 rounded-full bg-slate-100 mt-1 overflow-hidden"><div class="h-full ${p>=60?'bg-emerald-400':'bg-red-400'} rounded-full" style="width:${p}%"></div></div>`;
    return`<div class="flex flex-col"><div class="flex justify-between text-[11px]"><span class="font-semibold text-slate-600">${b.title}</span><span class="font-bold ${p>=60?'text-emerald-600':'text-red-500'}">${b.correct}/${b.total}</span></div>${bar}</div>`;
  }).join('');

  return`
  <div class="flex-1 flex flex-col items-center justify-center p-6 anim">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center w-full max-w-lg">
      <i data-lucide="award" class="w-12 h-12 mx-auto mb-4 ${col}"></i>
      <h2 class="text-xl font-black text-slate-800 mb-1">Simulazione Completata</h2>
      <p class="text-sm text-slate-500 mb-6">${msg}</p>
      <div class="flex justify-center gap-4 mb-6">
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex-1">
          <div class="text-3xl font-bold text-indigo-600 mb-1">${S.score}<span class="text-base text-slate-400">/${S.cases.length}</span></div>
          <div class="text-[10px] uppercase font-bold text-slate-500">Corrette</div>
        </div>
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex-1">
          <div class="text-3xl font-bold ${col} mb-1">${pct}%</div>
          <div class="text-[10px] uppercase font-bold text-slate-500">Precisione</div>
        </div>
      </div>
      ${catRows?`<div class="bg-slate-50 rounded-xl p-4 border border-slate-100 space-y-2.5 text-left mb-6">${catRows}</div>`:''}
      <div class="flex flex-col gap-3">
        <button onclick="openReview()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2 shadow-sm">
          <i data-lucide="list-checks" class="w-4 h-4"></i> Rivedi Tutti i Casi
        </button>
        <button onclick="goHome()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-700 transition-colors flex items-center justify-center gap-2">
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Nuova Sessione
        </button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER REVIEW MODAL
// ═══════════════════════════════════════════════════════════
function renderReview(){
  if(!S.reviewOpen)return'';
  const rows=S.cases.map((c,i)=>{
    const th=CAT[c.category]||{bg:'bg-slate-100',text:'text-slate-700',border:'border-slate-200',title:'—'};
    const ok=c.chosen_answer===c.correctAnswer;
    const icon=ok?'check-circle':'x-circle';
    const iconCol=ok?'text-green-600':'text-red-500';
    return`
    <div class="bg-white border border-slate-200 rounded-xl p-4 anim" style="animation-delay:${i*0.03}s">
      <div class="flex items-start justify-between gap-3 mb-2">
        <div class="flex items-center gap-2">
          <i data-lucide="${icon}" class="w-4 h-4 shrink-0 ${iconCol}"></i>
          <span class="text-[10px] font-bold ${th.text} bg-opacity-40 ${th.bg} px-2 py-0.5 rounded">${th.title}</span>
          <span class="text-[10px] text-slate-400 font-medium">#${i+1}</span>
        </div>
        <button onclick="jumpTo(${i})" class="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-2.5 py-1 rounded-md whitespace-nowrap transition-colors">
          Rivedi →
        </button>
      </div>
      <p class="text-[12px] text-slate-600 leading-snug mb-2 line-clamp-2">${c.scenario.substring(0,160)}…</p>
      <div class="flex flex-col gap-1 mt-2">
        <div class="flex items-center gap-2">
          <span class="text-[10px] font-bold text-slate-400 w-16 shrink-0">TUA RISP.</span>
          <span class="text-[12px] font-semibold ${ok?'text-green-700':'text-red-600'}">${c.chosen_answer||'—'}</span>
        </div>
        ${!ok?`<div class="flex items-center gap-2">
          <span class="text-[10px] font-bold text-slate-400 w-16 shrink-0">CORRETTA</span>
          <span class="text-[12px] font-semibold text-green-700">${c.correctAnswer}</span>
        </div>`:''}
      </div>
      <div class="mt-2 bg-slate-50 rounded-lg p-2.5 border border-slate-100">
        <p class="text-[11px] text-slate-500 leading-snug">${c.mech.substring(0,180)}…</p>
      </div>
    </div>`;
  }).join('');

  const tot=S.cases.length;
  const corr=S.cases.filter(c=>c.chosen_answer===c.correctAnswer).length;

  return`
  <div class="fixed inset-0 z-50 bg-slate-900/30 backdrop-blur-sm flex flex-col anim">
    <div class="bg-white w-full h-full flex flex-col max-w-2xl mx-auto sm:my-4 sm:h-[92vh] sm:rounded-2xl shadow-2xl overflow-hidden">
      <div class="bg-indigo-600 px-5 py-4 flex justify-between items-center shrink-0">
        <div>
          <h2 class="font-bold text-white text-base">Revisione Completa</h2>
          <p class="text-indigo-200 text-xs">${corr}/${tot} corrette · clicca "Rivedi →" per aprire il caso</p>
        </div>
        <button onclick="closeReview()" class="text-indigo-200 hover:text-white transition-colors p-1">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50 scrollbar-hide">
        ${rows}
      </div>
      <div class="p-4 bg-white border-t border-slate-200 shrink-0 flex gap-3">
        <button onclick="goHome()" class="flex-1 bg-slate-800 text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-700 transition-colors flex items-center justify-center gap-2">
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Nuova Sessione
        </button>
        <button onclick="closeReview()" class="flex-1 bg-white border border-slate-200 text-slate-700 py-3 rounded-xl font-bold text-sm hover:bg-slate-50 transition-colors flex items-center justify-center gap-2">
          <i data-lucide="x" class="w-4 h-4"></i> Chiudi
        </button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER CHAT
// ═══════════════════════════════════════════════════════════
function renderChat(){
  if(!S.chatOpen)return'';
  const c=S.cases[S.idx];
  const msgs=S.chatHist.map(m=>`
  <div class="flex ${m.role==='user'?'justify-end':'justify-start'} mb-3 anim">
    <div class="p-3 rounded-xl max-w-[88%] text-[13px] leading-relaxed shadow-sm ${m.role==='user'?'bg-indigo-600 text-white rounded-tr-sm':'bg-white border border-slate-200 text-slate-700 rounded-tl-sm rich'}">
      ${m.role==='user'?m.text:md(m.text)}
    </div>
  </div>`).join('');
  const typing=S.chatBusy?`<div class="flex justify-start mb-3"><div class="bg-white border border-slate-200 p-3 rounded-xl rounded-tl-sm shadow-sm flex items-center gap-2"><i data-lucide="loader-2" class="w-4 h-4 animate-spin text-indigo-500"></i><span class="text-[11px] font-semibold text-slate-400">Elaborazione…</span></div></div>`:'';
  return`
  <div class="fixed inset-0 z-50 bg-slate-900/25 backdrop-blur-sm flex flex-col justify-end p-2 sm:p-4 anim">
    <div class="bg-slate-50 w-full max-w-2xl mx-auto rounded-2xl shadow-2xl flex flex-col h-[76vh] overflow-hidden border border-slate-200">
      <div class="bg-white px-4 py-3 border-b border-slate-200 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
          <i data-lucide="bot" class="w-5 h-5 text-indigo-600"></i>
          <div>
            <div class="font-bold text-sm text-slate-800">Tutor IA</div>
            <div class="text-[10px] text-slate-400 font-medium">${c.correctAnswer} · ${c.tag}</div>
          </div>
        </div>
        <button onclick="toggleChat()" class="text-slate-400 hover:text-slate-600 transition-colors p-1"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div id="cs" class="flex-1 overflow-y-auto p-4 scrollbar-hide">
        ${!S.chatHist.length?`<div class="flex justify-start mb-3"><div class="bg-white border border-slate-200 p-4 rounded-xl rounded-tl-sm max-w-[88%] text-[13px] shadow-sm text-slate-600 leading-relaxed">Sono il tuo tutor per questo caso. Puoi chiedermi:<ul class="mt-2 space-y-1 text-slate-500 text-xs"><li>• Meccanismo molecolare approfondito</li><li>• Perché i farmaci decoy sono sbagliati</li><li>• Effetti avversi e controindicazioni</li><li>• Interazioni farmacologiche rilevanti</li><li>• Confronto con farmaci alternativi</li></ul></div></div>`:''}
        ${msgs}${typing}
      </div>
      <div class="bg-white p-3 border-t border-slate-200 shrink-0">
        <div class="flex gap-2">
          <input type="text" id="chat-input" onkeypress="chatEnter(event)" placeholder="Es: Perché non si usa il metoprololo qui?"
            class="flex-1 bg-slate-100 border border-slate-200 focus:border-indigo-400 rounded-lg px-4 py-2.5 text-[13px] outline-none transition-colors text-slate-800 placeholder:text-slate-400"/>
          <button onclick="sendChat()" ${S.chatBusy?'disabled':''} class="bg-indigo-600 text-white w-10 rounded-lg disabled:opacity-40 hover:bg-indigo-700 transition-colors flex items-center justify-center shrink-0">
            <i data-lucide="send" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER PRINCIPALE
// ═══════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('app');
  let html='';
  if(S.view==='home')    html=renderHome();
  else if(S.view==='loading') html=renderLoading();
  else if(S.view==='quiz')    html=renderQuiz();
  else if(S.view==='results') html=renderResults();
  html+=renderReview();
  html+=renderChat();
  root.innerHTML=html;
  if(window.lucide)lucide.createIcons();
}

// Salva la risposta scelta nel caso per la revisione
const _pickAnswer=pickAnswer;
pickAnswer=function(opt){
  if(S.chosen)return;
  S.cases[S.idx].chosen_answer=opt;
  _pickAnswer(opt);
};

document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
